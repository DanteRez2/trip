<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6d4cff">
  <title>Japan 2026 · Route Planner · Sprint 14</title>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">JAPAN · 2026</p>
        <h1>Tokyo → Kyoto → Osaka</h1>
        <p class="header-meta">03–13 November · 10 nights</p>
      </div>
      <div style="display:flex;align-items:center;gap:16px"><div id="headerTripBudget" style="font-weight:700;font-size:1rem"></div><button class="icon-button" id="todayButton" type="button">First day</button></div>
    </div>
  </header>

  <main class="app-shell">
    <section class="date-panel" aria-label="Trip dates">
      <div id="dateGroups" class="date-groups"></div>
    </section>

    <section id="dayView" class="day-view" aria-live="polite"></section>

    <nav class="day-controls" aria-label="Day navigation">
      <button id="prevDay" type="button">← Previous day</button>
      <span id="dayPosition" class="day-position"></span>
      <button id="nextDay" type="button">Next day →</button>
    </nav>
  </main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
